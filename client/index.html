<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Aliasly — create clean, custom-phrase short links. Pick your own alias; the redirect stays deterministic and safe under the hood." />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#211d14" />

    <!-- Open Graph / Twitter Card: these describe the app itself. Note
         that per-link previews (e.g. showing the destination site's own
         title when someone shares an /alias short link) aren't possible
         with a plain static SPA - that needs server-side rendering or a
         bot-detecting edge function, which is a bigger architecture change
         than this static-hosting setup supports today. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aliasly — Custom Short Links" />
    <meta property="og:description" content="Create clean, custom-phrase short links. Pick your own alias; the redirect stays deterministic and safe under the hood." />
    <meta property="og:image" content="/icon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aliasly — Custom Short Links" />
    <meta name="twitter:description" content="Create clean, custom-phrase short links." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Aliasly — Custom Short Links</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite injects your dev bundle; for prod, Nginx serves /index.html and /assets -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
